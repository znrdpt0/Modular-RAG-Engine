version: '3.8'

services:
  # 1. VERİTABANI: Qdrant
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334" # gRPC portunu da açtık (Hızlı iletişim için iyi bir pratik)
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped 

  # 2. Backend
  backend:
    build: ./rag-backend
    container_name: rag_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - qdrant
    restart: unless-stopped  

  # 3. Frontend
  frontend:
    build: ./rag-frontend
    container_name: rag_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped